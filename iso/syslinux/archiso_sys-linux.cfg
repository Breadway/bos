LABEL arch
TEXT HELP
Boot the Bread OS install medium on BIOS.
It allows you to install Bread OS or perform system maintenance.
ENDTEXT
MENU LABEL Bread OS install medium (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID%

# Copy-to-RAM boot option — loads airootfs.sfs entirely into RAM, so the
# installer reads from memory rather than a possibly-flaky USB (avoids SquashFS
# read errors during unpackfs). Needs enough RAM for the image (~3 GB).
LABEL archtoram
TEXT HELP
Boot Bread OS, copying the image into RAM first.
More reliable installs from USB; needs a few GB of RAM.
ENDTEXT
MENU LABEL Bread OS install medium (%ARCH%, BIOS) ^copy to RAM
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% copytoram=y

# Accessibility boot option
LABEL archspeech
TEXT HELP
Boot the Bread OS install medium on BIOS with speakup screen reader.
It allows you to install Bread OS or perform system maintenance with speech feedback.
ENDTEXT
MENU LABEL Bread OS install medium (%ARCH%, BIOS) with ^speech
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% accessibility=on
