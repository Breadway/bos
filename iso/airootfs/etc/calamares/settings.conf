---
modules-search: [/etc/calamares/modules, /usr/lib/calamares/modules]

# Second shellprocess instance: copies the live kernel into the target /boot
# (archiso keeps it out of the squashfs) before the bootloader step runs.
instances:
- id: kernel
  module: shellprocess
  config: shellprocess-kernel.conf

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - users
    - networkcfg
    - hwclock
    - packages
    - shellprocess@kernel
    - bootloader
    - shellprocess
    - umount
  - show:
    - finished

branding: bos
prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true
