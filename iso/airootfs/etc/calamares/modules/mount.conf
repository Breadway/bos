---
# Extra mount options applied by filesystem type.
# Btrfs subvolume mounts are already configured in partition.conf.
mountOptions:
  - filesystem: default
    options: [noatime]
  - filesystem: btrfs
    options: [noatime, "compress=zstd", "space_cache=v2"]
  - filesystem: vfat
    options: [umask=0077]
